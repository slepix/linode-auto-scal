services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: {}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTOSCALER_SECRET_KEY: ${AUTOSCALER_SECRET_KEY}
      DEBUG: "false"
    ports:
      - "8000:8000"

  controller:
    build:
      context: ./controller
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: {}
    environment:
      DATABASE_URL: ${CONTROLLER_DATABASE_URL}
      AUTOSCALER_SECRET_KEY: ${AUTOSCALER_SECRET_KEY}
      POLL_INTERVAL_SECONDS: "5"
      RECONCILE_INTERVAL_SECONDS: "60"
      METRICS_ADDR: ":9090"
    ports:
      - "9090:9090"
