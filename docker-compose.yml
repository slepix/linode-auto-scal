services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoscaler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoscaler}
      POSTGRES_DB: autoscaler
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoscaler -d autoscaler"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://autoscaler:${POSTGRES_PASSWORD:-autoscaler}@postgres:5432/autoscaler
      AUTOSCALER_SECRET_KEY: ${AUTOSCALER_SECRET_KEY}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  controller:
    build:
      context: ./controller
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://autoscaler:${POSTGRES_PASSWORD:-autoscaler}@postgres:5432/autoscaler?sslmode=disable
      AUTOSCALER_SECRET_KEY: ${AUTOSCALER_SECRET_KEY}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-5}
      RECONCILE_INTERVAL_SECONDS: ${RECONCILE_INTERVAL_SECONDS:-60}
      METRICS_ADDR: :9090
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
